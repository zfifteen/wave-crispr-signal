    - "git_commit"
    - "task_name"
    - "condition_id"
    - "dataset_sha256"
    - "runtime_seconds"
    - "pip_freeze"
    - "timestamp"

# Reproducibility
reproducibility:
  python_version: "3.12+"
  java_version: "TO_BE_DETERMINED (for EDE substrate)"
  dependencies: "../../../requirements.txt"
  
  environment_capture:
    - "git rev-parse HEAD"
    - "pip freeze > env.txt"
    - "date -u +%Y-%m-%dT%H:%M:%SZ"
  
  validation:
    - "Smoke test with synthetic/minimal data (< 5s)"
    - "Unit tests for spectral analysis components"
    - "Integration test end-to-end"

# CI integration (future)
ci:
