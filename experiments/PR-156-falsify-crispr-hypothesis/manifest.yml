# Experiment Manifest: PR-156 Falsification of CRISPR Hypotheses
# Generated: 2026-01-25

experiment:
  id: PR-156-falsify-crispr-hypothesis
  title: "Falsification Experiment for Wave-CRISPR Signal Hypotheses"
  created: "2026-01-25"
  version: "1.0.0"
  status: "active"
  
description: |
  Rigorous falsification testing of two key hypotheses:
  1. θ′(n,k) with k≈0.3 improves CRISPR guide efficiency prediction by ΔROC-AUC +0.047
  2. κ(n) creates Z-invariant scoring abstraction for variable-length sequences

hypotheses:
  hypothesis_1:
    statement: |
      The geodesic resolution function θ′(n,k) with k≈0.3, embedding golden ratio 
      phasing, quantifies single-nucleotide mutation disruptions via Δentropy and 
      sidelobe metrics, improving CRISPR guide efficiency prediction by ΔROC-AUC 
      +0.047 over baselines like RuleSet3.
    falsification_criteria:
      - "ΔROC-AUC <= 0 (no improvement)"
      - "p > 0.05 (not statistically significant)"
      - "95% CI includes zero"
    
  hypothesis_2:
    statement: |
      The sequence diversity-dependent curvature weighting κ(n) = d(n) · ln(n+1)/e² 
      creates a Z-invariant scoring abstraction that robustly handles variable-length 
      DNA sequences, revealing emergent periodicity patterns in off-target profiling.
    falsification_criteria:
      - "High variance in Z-scores across lengths (ANOVA p < 0.05)"
      - "No emergent periodicity (autocorrelation < 0.1)"

scientific_gates:
  - gate: "Human DNA only"
    status: "enforced"
    implementation: "A/C/G/T/N validation in phase_weighted_scorecard.py"
  
  - gate: "Fail-fast validation"
    status: "enforced"
    implementation: "ValueError raised on invalid nucleotides"
  
  - gate: "Z invariants"
    status: "enforced"
    implementation: "Discrete domain Z = A(B / e²)"
  
  - gate: "Geometric resolution"
    status: "enforced"
    implementation: "θ′(n,k) = φ·((n mod φ)/φ)^k with k ≈ 0.3"
  
  - gate: "Statistical validity"
    status: "enforced"
    implementation: "Bootstrap CI (≥1000), permutation tests, paired t-test"
  
  - gate: "Reproducibility"
    status: "enforced"
    implementation: "Fixed seed (default: 42), exact version pinning"

methods:
  hypothesis_1:
    approach: "ROC-AUC comparison with cross-validation"
    features:
      spectral:
        - "Δentropy (wild-type vs mutant)"
        - "Δsidelobes"
        - "Frequency shift"
      baseline:
        - "GC content (overall, first 5, last 5)"
        - "Sequence length"
    statistical_tests:
      - "10-fold cross-validation"
      - "Paired t-test"
      - "Bootstrap 95% CI (1000+ resamples)"
    
  hypothesis_2:
    approach: "ANOVA + autocorrelation analysis"
    measures:
      - "Z-scores across variable-length sequences (20-100 nt)"
      - "κ(n) = d(n) · ln(n+1) / e²"
    statistical_tests:
      - "ANOVA for length dependence"
      - "Autocorrelation for periodicity"

parameters:
  default:
    seed: 42
    k_parameter: 0.3
    phi: 1.6180339887498949
    e_squared: 7.3890560989306495
  
  hypothesis_1:
    n_samples: 100
    n_bootstrap: 1000
    n_folds: 10
    
  hypothesis_2:
    min_length: 20
    max_length: 100
    length_step: 10
    n_per_length: 20

datasets:
  synthetic:
    type: "generated"
    description: "Synthetic CRISPR guides with efficiency labels"
    n_samples: 100
    guide_length: 20
    mutation_range: [1, 3]
  
  planned:
    - name: "Doench 2016"
      url: "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4745674/"
      status: "not yet integrated"
    
    - name: "Hsu 2013"
      url: "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3773023/"
      status: "not yet integrated"
    
    - name: "Kim 2025"
      status: "check repository data/"

baselines:
  planned:
    - name: "RuleSet3"
      url: "https://github.com/MicrosoftResearch/Azimuth"
      status: "not yet integrated"
  
  current:
    - name: "GC-content baseline"
      status: "implemented"
      description: "Simple GC-content features as proxy"

outputs:
  hypothesis_1:
    file: "results/PR-156-falsify-hypothesis1/hypothesis1_results.json"
    format: "JSON"
    fields:
      - "timestamp"
      - "parameters"
      - "cross_validation results (AUC, p-value)"
      - "bootstrap results (mean, std, CI)"
      - "falsification decision"
  
  hypothesis_2:
    file: "results/PR-156-falsify-hypothesis2/hypothesis2_results.json"
    format: "JSON"
    fields:
      - "timestamp"
      - "parameters"
      - "invariance test (ANOVA F, p-value)"
      - "periodicity test (autocorrelation)"
      - "falsification decision"

execution:
  smoke_test:
    hypothesis_1:
      command: "python experiments/PR-156-falsify-crispr-hypothesis/falsify_hypothesis1.py --n-samples 20 --n-bootstrap 50 --n-folds 3"
      runtime: "<5 seconds"
    
    hypothesis_2:
      command: "python experiments/PR-156-falsify-crispr-hypothesis/falsify_hypothesis2.py --min-length 20 --max-length 40 --length-step 10 --n-per-length 5"
      runtime: "<5 seconds"
  
  full:
    hypothesis_1:
      command: "python experiments/PR-156-falsify-crispr-hypothesis/falsify_hypothesis1.py"
      runtime: "2-5 minutes"
    
    hypothesis_2:
      command: "python experiments/PR-156-falsify-crispr-hypothesis/falsify_hypothesis2.py"
      runtime: "1-2 minutes"

